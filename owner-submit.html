<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ridge Co — Owner Work Order Request</title>
<style>
  :root{--bg:#0f0f0f;--surface:#1a1a1a;--surface2:#242424;--border:#2e2e2e;--text:#e8e6e1;--muted:#888;--accent:#e8a020;--accent2:#4ade80;--danger:#f87171;--radius:8px;--font:'Courier New',monospace;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:24px 16px;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);width:100%;max-width:520px;padding:28px;}
  .logo{color:var(--accent);font-size:1.1rem;letter-spacing:0.15em;font-weight:bold;margin-bottom:4px;}
  .subtitle{color:var(--muted);font-size:11px;letter-spacing:0.1em;margin-bottom:24px;}
  .field{margin-bottom:16px;}
  label{display:block;color:var(--muted);font-size:11px;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:6px;}
  input,select,textarea{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:10px 12px;border-radius:var(--radius);font-family:var(--font);font-size:13px;}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent);}
  textarea{resize:vertical;min-height:80px;}
  .btn{width:100%;background:var(--accent);color:#000;border:none;padding:12px;border-radius:var(--radius);font-family:var(--font);font-size:14px;font-weight:bold;cursor:pointer;margin-top:8px;}
  .btn:hover{opacity:0.85;}
  .btn:disabled{opacity:0.4;cursor:not-allowed;}
  .upload-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:16px;text-align:center;cursor:pointer;position:relative;}
  .upload-zone:hover{border-color:var(--accent);}
  .upload-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
  .upload-zone p{color:var(--muted);font-size:12px;}
  .preview-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(70px,1fr));gap:6px;margin-top:8px;}
  .preview-item{position:relative;aspect-ratio:1;border-radius:4px;overflow:hidden;background:var(--surface2);}
  .preview-item img,.preview-item video{width:100%;height:100%;object-fit:cover;}
  .preview-item .remove{position:absolute;top:2px;right:2px;background:rgba(0,0,0,0.7);color:#fff;border:none;border-radius:50%;width:16px;height:16px;font-size:9px;cursor:pointer;}
  .error{color:var(--danger);font-size:12px;margin-top:4px;display:none;}
  .success-screen{display:none;text-align:center;padding:32px 20px;}
  .success-screen h2{color:var(--accent2);font-size:1.1rem;margin-bottom:8px;}
  .success-screen p{color:var(--muted);font-size:12px;line-height:1.6;}
  .loading-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);align-items:center;justify-content:center;z-index:100;flex-direction:column;gap:12px;}
  .loading-overlay.show{display:flex;}
  .spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.6s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .step{color:var(--muted);font-size:12px;}
  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  @media(max-width:400px){.two-col{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="card">
  <div class="logo">RIDGE CO</div>
  <div class="subtitle">OWNER / LANDLORD REQUEST</div>

  <div id="form-screen">
    <div class="two-col">
      <div class="field">
        <label>Your Name</label>
        <input type="text" id="owner-name" placeholder="Your name">
      </div>
      <div class="field">
        <label>Your Phone</label>
        <input type="tel" id="owner-phone" placeholder="Best number">
      </div>
    </div>

    <div class="field">
      <label>Property Address</label>
      <select id="property-select" onchange="loadUnits()">
        <option value="">Loading...</option>
      </select>
    </div>

    <div class="field" id="unit-field" style="display:none">
      <label>Unit (if applicable)</label>
      <select id="unit-select">
        <option value="">Whole property / not unit specific</option>
      </select>
    </div>

    <div class="field">
      <label>Type of Issue</label>
      <select id="trade-select">
        <option value="">Select...</option>
        <option>Plumbing</option><option>HVAC</option><option>Electric</option>
        <option>General</option><option>Appliance</option><option>Landscaping</option>
        <option>Roofing</option><option>Pest Control</option><option>Other</option>
      </select>
    </div>

    <div class="field">
      <label>Priority</label>
      <select id="priority-select">
        <option value="normal">Normal</option>
        <option value="urgent">Urgent</option>
        <option value="low">Low / Preventive</option>
      </select>
    </div>

    <div class="field">
      <label>Description</label>
      <textarea id="description" placeholder="Describe the issue, any background context, or special instructions for the contractor..."></textarea>
    </div>

    <div class="field">
      <label>Photos / Documents (optional)</label>
      <div class="upload-zone">
        <input type="file" id="file-input" accept="image/*,video/*,.pdf" multiple onchange="handleFiles(this.files)">
        <p>📎 Tap to attach photos or documents</p>
      </div>
      <div class="preview-grid" id="preview-grid"></div>
    </div>

    <div id="form-error" class="error"></div>
    <button class="btn" id="submit-btn" onclick="submitRequest()">Submit Request</button>
  </div>

  <div class="success-screen" id="success-screen">
    <div style="font-size:2.5rem;margin-bottom:12px">✅</div>
    <h2>Request Submitted</h2>
    <p>Work order <span id="wo-ref" style="color:var(--accent)"></span> has been created.<br>Your coordinator will follow up shortly.</p>
    <button class="btn" onclick="resetForm()" style="margin-top:16px;width:auto;padding:10px 20px">Submit Another</button>
  </div>
</div>

<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <div class="step" id="loading-step">Submitting...</div>
</div>

<script>
const WORKER = 'https://maintenance-hub.brett-2f8.workers.dev';
const TOKEN = 'mh-secret-2026-brett';
let allProperties = [], allUnits = [];
let selectedFiles = [];

async function init() {
  try {
    const [props, units] = await Promise.all([
      fetch(WORKER+'/properties',{headers:{'X-Auth-Token':TOKEN,'Content-Type':'application/json'}}).then(r=>r.json()),
      fetch(WORKER+'/units',{headers:{'X-Auth-Token':TOKEN,'Content-Type':'application/json'}}).then(r=>r.json()),
    ]);
    allProperties = Array.isArray(props) ? props.filter(p=>p.Active!=='FALSE') : [];
    allUnits = Array.isArray(units) ? units : [];
    const sel = document.getElementById('property-select');
    sel.innerHTML = '<option value="">Select property...</option>' +
      allProperties.map(p=>`<option value="${p.ID}">${p.Address}${p.City?' — '+p.City:''}</option>`).join('');
  } catch(e) {
    document.getElementById('property-select').innerHTML='<option>Error loading</option>';
  }
}

function loadUnits() {
  const propId = document.getElementById('property-select').value;
  const units = allUnits.filter(u=>u.Property_ID===propId);
  const uf = document.getElementById('unit-field');
  if(units.length>0){
    document.getElementById('unit-select').innerHTML =
      '<option value="">Whole property</option>' +
      units.map(u=>`<option value="${u.ID}">${u.Unit_Label}</option>`).join('');
    uf.style.display='block';
  } else { uf.style.display='none'; }
}

function handleFiles(files) {
  Array.from(files).forEach(f=>{ if(selectedFiles.length<6) selectedFiles.push(f); });
  renderPreviews();
}
function renderPreviews() {
  document.getElementById('preview-grid').innerHTML = selectedFiles.map((f,i)=>{
    const url=URL.createObjectURL(f);
    const isVideo=f.type.startsWith('video/');
    const isPDF=f.type==='application/pdf';
    return `<div class="preview-item">
      ${isPDF?`<div style="display:flex;align-items:center;justify-content:center;height:100%;font-size:1.5rem">📄</div>`
        :isVideo?`<video src="${url}" muted></video>`
        :`<img src="${url}">`}
      <button class="remove" onclick="removeFile(${i})">✕</button>
    </div>`;
  }).join('');
}
function removeFile(i){ selectedFiles.splice(i,1); renderPreviews(); }

async function submitRequest() {
  const propId = document.getElementById('property-select').value;
  const unitId = document.getElementById('unit-select').value;
  const trade = document.getElementById('trade-select').value;
  const desc = document.getElementById('description').value.trim();
  const priority = document.getElementById('priority-select').value;
  const ownerName = document.getElementById('owner-name').value.trim();
  const ownerPhone = document.getElementById('owner-phone').value.trim();

  if(!propId){showError('Select a property.');return;}
  if(!trade){showError('Select issue type.');return;}
  if(!desc){showError('Please describe the issue.');return;}

  document.getElementById('submit-btn').disabled=true;
  showLoading('Creating work order...');

  try{
    const wo = await fetch(WORKER+'/workorder',{
      method:'POST',
      headers:{'X-Auth-Token':TOKEN,'Content-Type':'application/json'},
      body:JSON.stringify({
        property_id:propId, unit_id:unitId, tenant_id:'',
        trade, priority, description:desc, type:'owner',
        created_by: ownerName||'owner',
        notes: ownerPhone?`Owner: ${ownerName} ${ownerPhone}`:'',
      })
    }).then(r=>r.json());

    if(!wo.id) throw new Error(wo.error||'Failed');

    if(selectedFiles.length>0){
      for(let i=0;i<selectedFiles.length;i++){
        showLoading(`Uploading file ${i+1} of ${selectedFiles.length}...`);
        const fd=new FormData();
        fd.append('file',selectedFiles[i]);
        fd.append('wo_id',wo.id);
        await fetch(WORKER+'/upload-photo',{method:'POST',headers:{'X-Auth-Token':TOKEN},body:fd});
      }
    }

    hideLoading();
    document.getElementById('wo-ref').textContent=wo.id;
    document.getElementById('form-screen').style.display='none';
    document.getElementById('success-screen').style.display='block';
  }catch(e){
    hideLoading();
    showError('Error: '+e.message);
    document.getElementById('submit-btn').disabled=false;
  }
}

function showError(m){const e=document.getElementById('form-error');e.textContent=m;e.style.display='block';}
function showLoading(m){document.getElementById('loading-step').textContent=m;document.getElementById('loading').classList.add('show');}
function hideLoading(){document.getElementById('loading').classList.remove('show');}
function resetForm(){
  selectedFiles=[];
  document.getElementById('form-screen').style.display='block';
  document.getElementById('success-screen').style.display='none';
  document.getElementById('submit-btn').disabled=false;
  document.getElementById('property-select').value='';
  document.getElementById('unit-field').style.display='none';
  document.getElementById('description').value='';
  document.getElementById('preview-grid').innerHTML='';
}

init();
</script>
</body>
</html>
