<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ridge Co — Owner Request</title>
<style>
  :root{--bg:#0f0f0f;--surface:#1a1a1a;--surface2:#242424;--border:#2e2e2e;--text:#e8e6e1;--muted:#888;--accent:#e8a020;--accent2:#4ade80;--danger:#f87171;--radius:8px;--font:'Courier New',monospace;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:24px 16px;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);width:100%;max-width:520px;padding:28px;}
  .logo{color:var(--accent);font-size:1.1rem;letter-spacing:0.15em;font-weight:bold;margin-bottom:4px;}
  .subtitle{color:var(--muted);font-size:11px;letter-spacing:0.1em;margin-bottom:24px;}
  .field{margin-bottom:16px;}
  label{display:block;color:var(--muted);font-size:11px;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:6px;}
  input,select,textarea{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:10px 12px;border-radius:var(--radius);font-family:var(--font);font-size:13px;}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent);}
  textarea{resize:vertical;min-height:80px;}
  .btn{width:100%;background:var(--accent);color:#000;border:none;padding:12px;border-radius:var(--radius);font-family:var(--font);font-size:14px;font-weight:bold;cursor:pointer;margin-top:4px;}
  .btn:hover{opacity:0.85;}
  .btn:disabled{opacity:0.4;cursor:not-allowed;}
  .btn.secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
  .pin-screen{text-align:center;padding:20px 0;}
  .pin-screen p{color:var(--muted);font-size:12px;margin-bottom:20px;line-height:1.6;}
  .pin-input{font-size:1.5rem;letter-spacing:0.15em;text-align:center;width:100%;margin:0 auto 16px;display:block;padding:14px;text-transform:uppercase;}
  .pin-error{color:var(--danger);font-size:12px;text-align:center;margin-bottom:12px;display:none;}
  .owner-confirm{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:20px;}
  .owner-confirm .name{font-size:1rem;color:var(--accent);margin-bottom:2px;}
  .owner-confirm .company{font-size:12px;color:var(--muted);}
  /* Searchable property select */
  .search-select{position:relative;}
  .search-select input[type=text]{width:100%;}
  .search-dropdown{display:none;position:absolute;top:100%;left:0;right:0;background:var(--surface2);border:1px solid var(--accent);border-top:none;border-radius:0 0 var(--radius) var(--radius);max-height:220px;overflow-y:auto;z-index:50;}
  .search-dropdown.open{display:block;}
  .search-option{padding:10px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--border);}
  .search-option:hover,.search-option:focus{background:var(--surface);color:var(--accent);}
  .search-option:last-child{border-bottom:none;}
  .search-option .addr{font-size:13px;}
  .search-option .meta{font-size:11px;color:var(--muted);margin-top:2px;}
  .upload-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:16px;text-align:center;cursor:pointer;position:relative;transition:border-color 0.2s;}
  .upload-zone:hover{border-color:var(--accent);}
  .upload-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
  .upload-zone p{color:var(--muted);font-size:12px;}
  .preview-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(70px,1fr));gap:6px;margin-top:8px;}
  .preview-item{position:relative;aspect-ratio:1;border-radius:4px;overflow:hidden;background:var(--surface2);}
  .preview-item img,.preview-item video{width:100%;height:100%;object-fit:cover;}
  .preview-item .remove{position:absolute;top:2px;right:2px;background:rgba(0,0,0,0.8);color:#fff;border:none;border-radius:50%;width:16px;height:16px;font-size:9px;cursor:pointer;}
  .form-error{color:var(--danger);font-size:12px;margin-top:4px;display:none;}
  .success-screen{display:none;text-align:center;padding:40px 0;}
  .success-screen h2{color:var(--accent2);font-size:1.1rem;margin-bottom:8px;}
  .success-screen p{color:var(--muted);font-size:12px;line-height:1.6;}
  .loading-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);align-items:center;justify-content:center;z-index:100;flex-direction:column;gap:12px;}
  .loading-overlay.show{display:flex;}
  .spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.6s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .step{color:var(--muted);font-size:12px;}
  .attempt-hint{color:var(--muted);font-size:11px;text-align:center;margin-top:8px;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">RIDGE CO</div>
  <div class="subtitle">OWNER / LANDLORD REQUEST</div>

  <!-- PIN SCREEN -->
  <div id="pin-screen">
    <div class="pin-screen">
      <p>Enter your access PIN.<br><span style="font-size:11px">3 letters + last 5 digits of your phone number</span></p>
      <input type="text" class="pin-input" id="pin-input" maxlength="8" placeholder="ABC12345" autocomplete="off" autocorrect="off" spellcheck="false">
      <div class="pin-error" id="pin-error"></div>
      <button class="btn" onclick="lookupPin()">Continue</button>
      <div class="attempt-hint" id="attempt-hint"></div>
    </div>
  </div>

  <!-- REQUEST FORM -->
  <div id="form-screen" style="display:none">
    <div class="owner-confirm" id="owner-confirm">
      <div class="name" id="oc-name"></div>
      <div class="company" id="oc-company"></div>
    </div>

    <div class="field">
      <label>Property</label>
      <div class="search-select">
        <input type="text" id="prop-search" placeholder="Type address or street number..." oninput="filterProperties()" onfocus="openPropDropdown()" autocomplete="off">
        <input type="hidden" id="prop-id">
        <div class="search-dropdown" id="prop-dropdown"></div>
      </div>
    </div>

    <div class="field" id="unit-field" style="display:none">
      <label>Unit (optional)</label>
      <select id="unit-select">
        <option value="">Whole property / not unit-specific</option>
      </select>
    </div>

    <div class="field">
      <label>Type of Issue</label>
      <select id="trade-select">
        <option value="">Select...</option>
        <option>Plumbing</option><option>HVAC</option><option>Electric</option>
        <option>General</option><option>Appliance</option><option>Landscaping</option>
        <option>Roofing</option><option>Pest Control</option><option>Other</option>
      </select>
    </div>

    <div class="field">
      <label>Priority</label>
      <select id="priority-select">
        <option value="normal">Normal</option>
        <option value="urgent">Urgent</option>
        <option value="low">Low / Preventive</option>
      </select>
    </div>

    <div class="field">
      <label>Your Reference / Tracking # <span style="font-weight:normal;color:var(--muted)">(optional)</span></label>
      <input type="text" id="owner-ref" placeholder="Your internal WO or PO number...">
    </div>
    <div class="field">
      <label>Description</label>
      <textarea id="description" placeholder="Describe the issue, any background context, or special instructions..."></textarea>
    </div>

    <div class="field">
      <label>Photos / Documents (optional)</label>
      <div class="upload-zone">
        <input type="file" id="file-input" accept="image/*,video/*,.pdf" multiple onchange="handleFiles(this.files)">
        <p>📎 Tap to attach photos or documents</p>
      </div>
      <div class="preview-grid" id="preview-grid"></div>
    </div>

    <div class="form-error" id="form-error"></div>
    <button class="btn" id="submit-btn" onclick="submitRequest()">Submit Request</button>
    <button class="btn secondary" onclick="resetToPin()" style="margin-top:8px">Not you? Go back</button>
  </div>

  <!-- SUCCESS -->
  <div class="success-screen" id="success-screen">
    <div style="font-size:2.5rem;margin-bottom:12px">✅</div>
    <h2>Request Submitted</h2>
    <p>Work order <span id="wo-ref" style="color:var(--accent)"></span> created.<br>Your coordinator will follow up.</p>
    <button class="btn" onclick="submitAnother()" style="margin-top:16px;width:auto;padding:10px 20px">Submit Another</button>
  </div>
</div>

<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <div class="step" id="loading-step">Loading...</div>
</div>

<script>
var WORKER = 'https://maintenance-hub.brett-2f8.workers.dev';
var TOKEN  = '';  // token from owner PIN login — NO hardcoded admin secret (SEC-1)
var ownerData = null;
var ownerProperties = [];
var selectedFiles = [];
var selectedProp = null;

// ── Numeric address sort ─────────────────────────────────────
function sortPropsNumeric(props) {
  return props.slice().sort(function(a, b) {
    var na = parseInt((a.Address||'').match(/^\d+/)?.[0] || '99999');
    var nb = parseInt((b.Address||'').match(/^\d+/)?.[0] || '99999');
    if (na !== nb) return na - nb;
    return (a.Address||'').localeCompare(b.Address||'');
  });
}

document.getElementById('pin-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') lookupPin();
});
document.getElementById('pin-input').addEventListener('input', function() {
  this.value = this.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
});

function apiFetch(path) {
  return fetch(WORKER+path, {headers:{'X-Auth-Token':TOKEN,'Content-Type':'application/json'}}).then(function(r){return r.json();});
}
function apiPost(path, body) {
  return fetch(WORKER+path, {method:'POST',headers:{'X-Auth-Token':TOKEN,'Content-Type':'application/json'},body:JSON.stringify(body)}).then(function(r){return r.json();});
}

function lookupPin() {
  var pin = document.getElementById('pin-input').value.trim();
  var errEl = document.getElementById('pin-error');
  errEl.style.display = 'none';
  if (pin.length < 8) {
    errEl.textContent = 'PIN must be 8 characters (3 letters + 5 digits).';
    errEl.style.display = 'block';
    return;
  }
  showLoading('Verifying PIN...');
  apiFetch('/owner-by-pin?pin=' + encodeURIComponent(pin))
    .then(function(res) {
      if (res.error) {
        hideLoading();
        if (res.locked) {
          errEl.textContent = 'Account locked. Try again in ' + res.minutes_remaining + ' minute' + (res.minutes_remaining !== 1 ? 's' : '') + '.';
          document.getElementById('pin-input').disabled = true;
          setTimeout(function() { document.getElementById('pin-input').disabled = false; }, res.minutes_remaining * 60000);
        } else {
          errEl.textContent = res.error;
          var hint = document.getElementById('attempt-hint');
          hint.textContent = '';
        }
        errEl.style.display = 'block';
        return;
      }
      ownerData = res;
      if (res.token) TOKEN = res.token;   // scoped owner token drives submit + upload
      showLoading('Loading your properties...');
      return apiFetch('/owner-properties?owner_id=' + res.owner_id)
        .then(function(props) {
          ownerProperties = sortPropsNumeric(Array.isArray(props) ? props : []);
          hideLoading();
          document.getElementById('oc-name').textContent = res.owner_name;
          document.getElementById('oc-company').textContent = res.owner_company || '';
          document.getElementById('pin-screen').style.display = 'none';
          document.getElementById('form-screen').style.display = 'block';
          buildPropDropdown(ownerProperties);
        });
    })
    .catch(function() {
      hideLoading();
      errEl.textContent = 'Connection error. Please try again.';
      errEl.style.display = 'block';
    });
}

// ── Property dropdown ────────────────────────────────────────

function buildPropDropdown(props) {
  var dd = document.getElementById('prop-dropdown');
  if (!props.length) {
    dd.innerHTML = '<div class="search-option" style="color:var(--muted)">No properties found</div>';
    return;
  }
  dd.innerHTML = props.map(function(p) {
    var unitCount = p.units ? p.units.length : 0;
    var meta = (p.City ? p.City : '') + (unitCount > 0 ? (p.City ? ' · ' : '') + unitCount + ' unit' + (unitCount !== 1 ? 's' : '') : '');
    return '<div class="search-option" onclick="selectProperty(\'' + p.ID + '\')">' +
      '<div class="addr">' + p.Address + '</div>' +
      (meta ? '<div class="meta">' + meta + '</div>' : '') +
      '</div>';
  }).join('');
}

function filterProperties() {
  var q = document.getElementById('prop-search').value.toLowerCase();
  var filtered = q
    ? ownerProperties.filter(function(p) {
        return (p.Address||'').toLowerCase().includes(q) || (p.City||'').toLowerCase().includes(q);
      })
    : ownerProperties;
  buildPropDropdown(filtered);
  openPropDropdown();
  // Clear selection while typing
  document.getElementById('prop-id').value = '';
  selectedProp = null;
  document.getElementById('unit-field').style.display = 'none';
}

function openPropDropdown() {
  document.getElementById('prop-dropdown').classList.add('open');
}

function selectProperty(propId) {
  var prop = ownerProperties.find(function(p) { return p.ID === propId; });
  if (!prop) return;
  selectedProp = prop;
  document.getElementById('prop-id').value = propId;
  document.getElementById('prop-search').value = prop.Address + (prop.City ? ', ' + prop.City : '');
  document.getElementById('prop-dropdown').classList.remove('open');
  if (prop.units && prop.units.length > 0) {
    var sel = document.getElementById('unit-select');
    sel.innerHTML = '<option value="">Whole property</option>' +
      prop.units.map(function(u) { return '<option value="' + u.ID + '">' + u.Unit_Label + '</option>'; }).join('');
    document.getElementById('unit-field').style.display = 'block';
  } else {
    document.getElementById('unit-field').style.display = 'none';
  }
}

document.addEventListener('click', function(e) {
  if (!e.target.closest('.search-select'))
    document.getElementById('prop-dropdown').classList.remove('open');
});

// ── Files ────────────────────────────────────────────────────

function handleFiles(files) {
  Array.from(files).forEach(function(f) { if (selectedFiles.length < 6) selectedFiles.push(f); });
  renderPreviews();
}
function renderPreviews() {
  document.getElementById('preview-grid').innerHTML = selectedFiles.map(function(f, i) {
    var url = URL.createObjectURL(f);
    var isPDF = f.type === 'application/pdf';
    var isVideo = f.type.startsWith('video/');
    return '<div class="preview-item">' +
      (isPDF ? '<div style="display:flex;align-items:center;justify-content:center;height:100%;font-size:1.5rem">📄</div>'
             : isVideo ? '<video src="' + url + '" muted></video>'
             : '<img src="' + url + '">') +
      '<button class="remove" onclick="removeFile(' + i + ')">✕</button></div>';
  }).join('');
}
function removeFile(i) { selectedFiles.splice(i, 1); renderPreviews(); }

// ── Submit ───────────────────────────────────────────────────

function submitRequest() {
  var propId = document.getElementById('prop-id').value;
  var unitId = document.getElementById('unit-select').value || '';
  var trade = document.getElementById('trade-select').value;
  var desc = document.getElementById('description').value.trim();
  var priority = document.getElementById('priority-select').value;
  var errEl = document.getElementById('form-error');
  errEl.style.display = 'none';

  if (!propId) { errEl.textContent = 'Please select a property.'; errEl.style.display = 'block'; return; }
  if (!trade)  { errEl.textContent = 'Please select issue type.'; errEl.style.display = 'block'; return; }
  if (!desc)   { errEl.textContent = 'Please describe the issue.'; errEl.style.display = 'block'; return; }

  document.getElementById('submit-btn').disabled = true;
  showLoading('Creating work order...');

  fetch(WORKER + '/workorder', {
    method: 'POST',
    headers: {'X-Auth-Token': TOKEN, 'Content-Type': 'application/json'},
    body: JSON.stringify({
      property_id: propId, unit_id: unitId, tenant_id: '',
      trade: trade, priority: priority, description: desc, type: 'owner',
      owner_wo_ref: (document.getElementById('owner-ref').value||'').trim(),
      created_by: ownerData.owner_name,
      notes: 'Owner request from ' + ownerData.owner_name + (ownerData.owner_company ? ' (' + ownerData.owner_company + ')' : ''),
    })
  })
  .then(function(r) { return r.json(); })
  .then(function(wo) {
    if (!wo.id) throw new Error(wo.error || 'Failed to create work order');
    var woId = wo.id;
    var uploads = Promise.resolve();
    selectedFiles.forEach(function(f, i) {
      uploads = uploads.then(function() {
        showLoading('Uploading file ' + (i+1) + ' of ' + selectedFiles.length + '...');
        var fd = new FormData();
        fd.append('file', f);
        fd.append('wo_id', woId);
        fd.append('type', 'other');
        fd.append('uploaded_by', ownerData.owner_name);
        return fetch(WORKER + '/upload-photo', {method:'POST', headers:{'X-Auth-Token':TOKEN}, body:fd});
      });
    });
    return uploads.then(function() {
      hideLoading();
      document.getElementById('wo-ref').textContent = woId;
      document.getElementById('form-screen').style.display = 'none';
      document.getElementById('success-screen').style.display = 'block';
    });
  })
  .catch(function(e) {
    hideLoading();
    errEl.textContent = 'Error: ' + e.message;
    errEl.style.display = 'block';
    document.getElementById('submit-btn').disabled = false;
  });
}

function resetToPin() {
  ownerData = null; ownerProperties = []; selectedFiles = []; selectedProp = null;
  document.getElementById('pin-input').value = '';
  document.getElementById('pin-input').disabled = false;
  document.getElementById('pin-error').style.display = 'none';
  document.getElementById('attempt-hint').textContent = '';
  document.getElementById('form-screen').style.display = 'none';
  document.getElementById('pin-screen').style.display = 'block';
}

function submitAnother() {
  selectedFiles = [];
  document.getElementById('success-screen').style.display = 'none';
  document.getElementById('description').value = '';
  document.getElementById('trade-select').value = '';
  document.getElementById('owner-ref').value = '';
  document.getElementById('prop-search').value = '';
  document.getElementById('prop-id').value = '';
  document.getElementById('preview-grid').innerHTML = '';
  document.getElementById('submit-btn').disabled = false;
  document.getElementById('form-error').style.display = 'none';
  document.getElementById('form-screen').style.display = 'block';
}

function showLoading(msg) { document.getElementById('loading-step').textContent = msg; document.getElementById('loading').classList.add('show'); }
function hideLoading() { document.getElementById('loading').classList.remove('show'); }
</script>
</body>
</html>
