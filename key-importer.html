  th{text-align:left;padding:5px 8px;color:var(--muted);border-bottom:1px solid var(--border);font-size:10px;}
  td{padding:5px 8px;border-bottom:1px solid var(--border);}

let connected=false;
function getWorker(){return document.getElementById("worker-url").value.trim();}
function getToken(){return document.getElementById("auth-token").value.trim();}
async function apiPost(path,body){const r=await fetch(getWorker()+path,{method:"POST",headers:{"X-Auth-Token":getToken(),"Content-Type":"application/json"},body:JSON.stringify(body)});return r.json();}
async function connect(){
  document.getElementById("conn-status").textContent="Connecting...";
  try{const r=await fetch(getWorker()+"/config",{headers:{"X-Auth-Token":getToken(),"Content-Type":"application/json"}});const d=await r.json();if(d.error)throw new Error(d.error);connected=true;document.getElementById("conn-status").textContent="Connected";}
  catch(e){document.getElementById("conn-status").textContent="Error: "+e.message;}
}

async function runImport(){
  if(!connected){alert("Connect first");return;}
  const logEl=document.getElementById("log"),bar=document.getElementById("progress-bar"),fill=document.getElementById("progress-fill");
  logEl.innerHTML="";bar.style.display="block";
  let ok=0,fail=0;const today=new Date().toISOString().split("T")[0];
  for(let i=0;i<IMPORT_KEYS.length;i++){
    const k=IMPORT_KEYS[i];
    fill.style.width=Math.round((i/IMPORT_KEYS.length)*100)+"%";
    try{
      const res=await apiPost("/key/add",{Property_ID:k.prop_id,Unit_ID:"",Unit_Label:k.unit_label,Owner_ID:k.owner_id,Key_Type:k.key_type,Key_Code:k.key_code,Lockbox_Code:k.lockbox_code,Lockbox_Location:k.lockbox_location,Notes:k.notes,Status:k.status,Last_Changed:k.last_changed||today,Active:"TRUE"});

      else{fail++;logEl.innerHTML+=`<div class="err">❌ ${k.prop_addr}: ${JSON.stringify(res)}</div>`;}
    }catch(e){fail++;logEl.innerHTML+=`<div class="err">❌ ${k.prop_addr}: ${e.message}</div>`;}
    logEl.scrollTop=logEl.scrollHeight;
    await new Promise(r=>setTimeout(r,200));
  }
  fill.style.width="100%";
  logEl.innerHTML+=`<div class="info" style="font-weight:bold;margin-top:6px">Done: ${ok} imported, ${fail} failed.</div>`;
}
