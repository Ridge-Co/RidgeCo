<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ridge Co — Maintenance Hub</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: Georgia, serif;
    background: #1a1a1a;
    color: #f9f8f6;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .container { text-align: center; padding: 40px 24px; }
  h1 { font-size: 2rem; font-weight: normal; letter-spacing: 0.05em; margin-bottom: 12px; }
  p { color: #888; font-size: 0.95rem; }
  .dot { display: inline-block; width: 8px; height: 8px; background: #4ade80; border-radius: 50%; margin-right: 8px; animation: pulse 2s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
</style>
</head>
<body>
<div class="container">
  <h1>Ridge Co</h1>
  <p><span class="dot"></span>Maintenance Hub — Coming Soon</p>
</div>
</body>
</html>
